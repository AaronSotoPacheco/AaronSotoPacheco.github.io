<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard de Usuarios</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark">
  <div class="container mt-5">
    <header class="text-center mb-4">
      <h1 class="display-4 text-white" >Users</h1>
    </header>

    <!-- Tabla de Usuarios -->
    <section id="user-list">
      <div class="card shadow">
        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
          <h2 class="h5 mb-0">Registered Users</h2>
          <input type="text" id="search-user" class="form-control w-25" placeholder="Buscar usuario">
        </div>
        <div class="card-body">
          <table class="table table-hover">
            <thead class="table-secondary">
              <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Email</th>
                <th>Registration date</th>
                <th>Level</th>
              </tr>
            </thead>
            <tbody id="user-table">
              <!-- Aquí se cargan los usuarios -->
            </tbody>
          </table>
        </div>
      </div>
    </section>
  </div>

  <!-- Bootstrap Bundle with Popper -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Script Principal -->
  <script src="admin.js"></script>
</body>
</html>
