<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="register page">
    <title>Register</title>
    <link rel="stylesheet" href="css/media-query-register.css">
    <link rel="stylesheet" href="css/register.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.8.1/css/all.css" integrity="sha384-50oBUHEmvpQ+1lW4y57PTFmhCaXp0ML5d60M1M7uH2+nqUivzIebhndOJK28anvf" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <style>
        /* Set background image for the body */
        body {
            background-image: url('img/img_register.webp'); /* Replace with your background image */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh; /* Ensure the body takes full viewport height */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Center the registration form container */
        .container {
            
            width: 100%;
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.8); /* Transparent white background */
            border-radius: 10px;
        }

        .registration-form .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .registration-form .header h2 {
            font-size: 1.8rem;
        }

        .registration-form .icon {
            text-align: center;
            margin-bottom: 20px;
        }

        .registration-form .icon img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
        }

        .registration-form .card {
            border: none;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="registration-form">
            <div class="header">
                <h2>Registration</h2>
                <a href="login.html"><span class="close-btn"><i class="fa fa-times-circle" aria-hidden="true"></i></span></a>
            </div>

            <div class="icon">
                <img src="img/user_icon.webp" alt="User">
            </div>

            <section id="create-tournament" class="mb-5">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h2 class="h5 mb-0">Create Tournament</h2>
                    </div>
                    <div class="card-body">
                        <form id="registration-form">
                            <div class="mb-3">
                                <label for="tournament_name" class="form-label">Tournament name:</label>
                                <input type="text" id="tournament_name" name="name" class="form-control" placeholder="Ej. Copa de Verano" required>
                            </div>

                            <div class="mb-3">
                                <label for="type" class="form-label">Ruleset:</label>
                                <select id="type" name="type" class="form-select" required>
                                    <option value="eliminacion">Eliminación Directa</option>
                                    <option value="formato_suizo">Formato Suizo</option>
                                    <option value="doble_eliminacion">Doble Eliminación</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="videogame" class="form-label">VideoGame:</label>
                                <select id="videogame" name="txtVideogame" class="form-select" required>
                                    <option value="fortnite">Fornite</option>
                                    <option value="lol">League of Legends</option>
                                    <option value="ssbu">Super Smash Bros Ultimate</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="file" class="form-label">Ingresa la imagen:</label>
                                <input type="file" id="file" name="txtImg" class="form-control" required>
                            </div>

                            <button type="submit" class="btn btn-primary w-100">Register</button>
                        </form>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>

</body>

</html>
